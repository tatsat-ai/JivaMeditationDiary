        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.5.0.min.js" integrity="sha256-fHbNLP+GlIXN+efbQec78UkemUz3NJp7UmfGxC1tNxs=" crossorigin="anonymous"></script>                <div id="a3e4f224-ced4-4dd0-84df-eb24f7ed6fa2" class="plotly-graph-div" style="height:480px; width:100%;"></div>            <script>                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("a3e4f224-ced4-4dd0-84df-eb24f7ed6fa2")) {                    Plotly.newPlot(                        "a3e4f224-ced4-4dd0-84df-eb24f7ed6fa2",                        [{"colorscale":[[0.0,"#440154"],[0.1111111111111111,"#482878"],[0.2222222222222222,"#3e4989"],[0.3333333333333333,"#31688e"],[0.4444444444444444,"#26828e"],[0.5555555555555556,"#1f9e89"],[0.6666666666666666,"#35b779"],[0.7777777777777778,"#6ece58"],[0.8888888888888888,"#b5de2b"],[1.0,"#fde725"]],"customdata":[[["INSIGHTS  \u00b7  R1 vs R1  \u00b7  avg=1.0000","\u2500\u2500\u2500 Run 1, Session 1 (self-comparison) \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, felt like a grounding anchor. It wasn't a sudden flash of understanding, but a settling\u2014a recognition that there is a core structure beneath the noise of my immediate awareness. The most persistent realization came during the Mahamantra. The concept of \u2018Radha-dasya\u2019 was the most potent. It shifted the focus from *doing* the practice to *being* in the mood of devotion. It\u2019s not about forcing a feeling; it\u2019s about allowing the sound to invite a specific quality of internal receptivity. I noticed that the 'pleasure' being described wasn't external reward, but a state of pure, receptive presence."],["INSIGHTS  \u00b7  R1 vs R2  \u00b7  avg=0.5021","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, felt like a grounding anchor. It wasn't a sudden flash of understanding, but a settling\u2014a recognition that there is a core structure beneath the noise of my immediate awareness. The most persistent realization came during the Mahamantra. The concept of \u2018Radha-dasya\u2019 was the most potent. It shifted the focus from *doing* the practice to *being* in the mood of devotion. It\u2019s not about forcing a feeling; it\u2019s about allowing the sound to invite a specific quality of internal receptivity. I noticed that the 'pleasure' being described wasn't external reward, but a state of pure, receptive presence.\n\n\u2500\u2500\u2500 Run 2, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, served as a grounding mechanism. It didn't bring a sudden, explosive realization, but rather a subtle shift in baseline awareness. The most persistent observation was the nature of the internal state requested\u2014the *Radha-dasya* mood. Trying to hold the image of 'serving' was challenging. There were moments where the concept felt abstract, but when the sound of the Mahamantra began to merge with the conceptual understanding of 'pleasure potency' and 'attraction,' a sense of resonance arose. It wasn't an intellectual understanding; it felt more like a pattern recognition\u2014the sound pattern was consistently mirroring the emotional state described. The insight wasn't a grand philosophical truth, but the recognition that the structure of the mantra itself carries a specific energetic signature that can be aligned with a desired internal mode."],["INSIGHTS  \u00b7  R1 vs R4  \u00b7  avg=0.6346","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, felt like a grounding anchor. It wasn't a sudden flash of understanding, but a settling\u2014a recognition that there is a core structure beneath the noise of my immediate awareness. The most persistent realization came during the Mahamantra. The concept of \u2018Radha-dasya\u2019 was the most potent. It shifted the focus from *doing* the practice to *being* in the mood of devotion. It\u2019s not about forcing a feeling; it\u2019s about allowing the sound to invite a specific quality of internal receptivity. I noticed that the 'pleasure' being described wasn't external reward, but a state of pure, receptive presence.\n\n\u2500\u2500\u2500 Run 4, Session 1 \u2500\u2500\u2500\nThe inner understanding was the most challenging part to maintain consistently. Trying to hold the image of Radha-dasya\u2014the mood of service\u2014while the sound was relentlessly active was like trying to hold water in a moving vessel. There were moments where the intention dissolved, replaced by the sheer mechanical act of counting the beads, or a flicker of planning for the next task intruding on the sound."],["INSIGHTS  \u00b7  R1 vs R5  \u00b7  avg=0.6100","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, felt like a grounding anchor. It wasn't a sudden flash of understanding, but a settling\u2014a recognition that there is a core structure beneath the noise of my immediate awareness. The most persistent realization came during the Mahamantra. The concept of \u2018Radha-dasya\u2019 was the most potent. It shifted the focus from *doing* the practice to *being* in the mood of devotion. It\u2019s not about forcing a feeling; it\u2019s about allowing the sound to invite a specific quality of internal receptivity. I noticed that the 'pleasure' being described wasn't external reward, but a state of pure, receptive presence.\n\n\u2500\u2500\u2500 Run 5, Session 1 \u2500\u2500\u2500\nThere were no sudden, dramatic revelations. The insight was subtle, occurring primarily during the transition points between rounds. When the chanting became rhythmic enough, the constant stream of internal monologue\u2014the planning, the anxieties about the next task, the processing of past events\u2014began to lose its immediate grip. It wasn't an eradication of thought, but rather a change in its *weight*. The mantra itself acted as an anchor, not by silencing the thoughts, but by providing a persistent, external point of reference. The understanding about Radha-dasya\u2014the active service within a specific relational mood\u2014felt like a directive rather than a philosophical concept. It shifted the focus from *what I am thinking* to *how I am choosing to relate* to the sound."],["INSIGHTS  \u00b7  R1 vs R6  \u00b7  avg=0.5889","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, felt like a grounding anchor. It wasn't a sudden flash of understanding, but a settling\u2014a recognition that there is a core structure beneath the noise of my immediate awareness. The most persistent realization came during the Mahamantra. The concept of \u2018Radha-dasya\u2019 was the most potent. It shifted the focus from *doing* the practice to *being* in the mood of devotion. It\u2019s not about forcing a feeling; it\u2019s about allowing the sound to invite a specific quality of internal receptivity. I noticed that the 'pleasure' being described wasn't external reward, but a state of pure, receptive presence.\n\n\u2500\u2500\u2500 Run 6, Session 1 \u2500\u2500\u2500\nThe most significant realization wasn't a sudden flash of profound understanding, but a recognition of the constant battleground of the mind. I noticed that the intention to feel \"Radha-dasya\" is fragile. It is easily replaced by the mundane concerns of the day or internal planning. The effort required to pull the attention back to the specific quality of the sound, rather than letting the sound simply wash over me, was exhausting. It showed me how easily the self defaults to its habitual modes of thinking, even when a dedicated focus is attempted."],["INSIGHTS  \u00b7  R1 vs R7  \u00b7  avg=0.4917","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, felt like a grounding anchor. It wasn't a sudden flash of understanding, but a settling\u2014a recognition that there is a core structure beneath the noise of my immediate awareness. The most persistent realization came during the Mahamantra. The concept of \u2018Radha-dasya\u2019 was the most potent. It shifted the focus from *doing* the practice to *being* in the mood of devotion. It\u2019s not about forcing a feeling; it\u2019s about allowing the sound to invite a specific quality of internal receptivity. I noticed that the 'pleasure' being described wasn't external reward, but a state of pure, receptive presence.\n\n\u2500\u2500\u2500 Run 7, Session 1 \u2500\u2500\u2500\nThe understanding\u2014Hare is Srimati Radhika, Krishna is the attractor\u2014was the hinge point. When I tried to hold that concept while the sounds were happening, the effort was immense. It wasn't a sudden flash of insight; it was more like holding a very delicate, vibrating thread."]],[["INSIGHTS  \u00b7  R2 vs R1  \u00b7  avg=0.5021","\u2500\u2500\u2500 Run 2, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, served as a grounding mechanism. It didn't bring a sudden, explosive realization, but rather a subtle shift in baseline awareness. The most persistent observation was the nature of the internal state requested\u2014the *Radha-dasya* mood. Trying to hold the image of 'serving' was challenging. There were moments where the concept felt abstract, but when the sound of the Mahamantra began to merge with the conceptual understanding of 'pleasure potency' and 'attraction,' a sense of resonance arose. It wasn't an intellectual understanding; it felt more like a pattern recognition\u2014the sound pattern was consistently mirroring the emotional state described. The insight wasn't a grand philosophical truth, but the recognition that the structure of the mantra itself carries a specific energetic signature that can be aligned with a desired internal mode.\n\n\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, felt like a grounding anchor. It wasn't a sudden flash of understanding, but a settling\u2014a recognition that there is a core structure beneath the noise of my immediate awareness. The most persistent realization came during the Mahamantra. The concept of \u2018Radha-dasya\u2019 was the most potent. It shifted the focus from *doing* the practice to *being* in the mood of devotion. It\u2019s not about forcing a feeling; it\u2019s about allowing the sound to invite a specific quality of internal receptivity. I noticed that the 'pleasure' being described wasn't external reward, but a state of pure, receptive presence."],["INSIGHTS  \u00b7  R2 vs R2  \u00b7  avg=1.0000","\u2500\u2500\u2500 Run 2, Session 1 (self-comparison) \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, served as a grounding mechanism. It didn't bring a sudden, explosive realization, but rather a subtle shift in baseline awareness. The most persistent observation was the nature of the internal state requested\u2014the *Radha-dasya* mood. Trying to hold the image of 'serving' was challenging. There were moments where the concept felt abstract, but when the sound of the Mahamantra began to merge with the conceptual understanding of 'pleasure potency' and 'attraction,' a sense of resonance arose. It wasn't an intellectual understanding; it felt more like a pattern recognition\u2014the sound pattern was consistently mirroring the emotional state described. The insight wasn't a grand philosophical truth, but the recognition that the structure of the mantra itself carries a specific energetic signature that can be aligned with a desired internal mode."],["INSIGHTS  \u00b7  R2 vs R4  \u00b7  avg=0.4608","\u2500\u2500\u2500 Run 2, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, served as a grounding mechanism. It didn't bring a sudden, explosive realization, but rather a subtle shift in baseline awareness. The most persistent observation was the nature of the internal state requested\u2014the *Radha-dasya* mood. Trying to hold the image of 'serving' was challenging. There were moments where the concept felt abstract, but when the sound of the Mahamantra began to merge with the conceptual understanding of 'pleasure potency' and 'attraction,' a sense of resonance arose. It wasn't an intellectual understanding; it felt more like a pattern recognition\u2014the sound pattern was consistently mirroring the emotional state described. The insight wasn't a grand philosophical truth, but the recognition that the structure of the mantra itself carries a specific energetic signature that can be aligned with a desired internal mode.\n\n\u2500\u2500\u2500 Run 4, Session 1 \u2500\u2500\u2500\nThe inner understanding was the most challenging part to maintain consistently. Trying to hold the image of Radha-dasya\u2014the mood of service\u2014while the sound was relentlessly active was like trying to hold water in a moving vessel. There were moments where the intention dissolved, replaced by the sheer mechanical act of counting the beads, or a flicker of planning for the next task intruding on the sound."],["INSIGHTS  \u00b7  R2 vs R5  \u00b7  avg=0.6493","\u2500\u2500\u2500 Run 2, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, served as a grounding mechanism. It didn't bring a sudden, explosive realization, but rather a subtle shift in baseline awareness. The most persistent observation was the nature of the internal state requested\u2014the *Radha-dasya* mood. Trying to hold the image of 'serving' was challenging. There were moments where the concept felt abstract, but when the sound of the Mahamantra began to merge with the conceptual understanding of 'pleasure potency' and 'attraction,' a sense of resonance arose. It wasn't an intellectual understanding; it felt more like a pattern recognition\u2014the sound pattern was consistently mirroring the emotional state described. The insight wasn't a grand philosophical truth, but the recognition that the structure of the mantra itself carries a specific energetic signature that can be aligned with a desired internal mode.\n\n\u2500\u2500\u2500 Run 5, Session 1 \u2500\u2500\u2500\nThere were no sudden, dramatic revelations. The insight was subtle, occurring primarily during the transition points between rounds. When the chanting became rhythmic enough, the constant stream of internal monologue\u2014the planning, the anxieties about the next task, the processing of past events\u2014began to lose its immediate grip. It wasn't an eradication of thought, but rather a change in its *weight*. The mantra itself acted as an anchor, not by silencing the thoughts, but by providing a persistent, external point of reference. The understanding about Radha-dasya\u2014the active service within a specific relational mood\u2014felt like a directive rather than a philosophical concept. It shifted the focus from *what I am thinking* to *how I am choosing to relate* to the sound."],["INSIGHTS  \u00b7  R2 vs R6  \u00b7  avg=0.5552","\u2500\u2500\u2500 Run 2, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, served as a grounding mechanism. It didn't bring a sudden, explosive realization, but rather a subtle shift in baseline awareness. The most persistent observation was the nature of the internal state requested\u2014the *Radha-dasya* mood. Trying to hold the image of 'serving' was challenging. There were moments where the concept felt abstract, but when the sound of the Mahamantra began to merge with the conceptual understanding of 'pleasure potency' and 'attraction,' a sense of resonance arose. It wasn't an intellectual understanding; it felt more like a pattern recognition\u2014the sound pattern was consistently mirroring the emotional state described. The insight wasn't a grand philosophical truth, but the recognition that the structure of the mantra itself carries a specific energetic signature that can be aligned with a desired internal mode.\n\n\u2500\u2500\u2500 Run 6, Session 1 \u2500\u2500\u2500\nThe most significant realization wasn't a sudden flash of profound understanding, but a recognition of the constant battleground of the mind. I noticed that the intention to feel \"Radha-dasya\" is fragile. It is easily replaced by the mundane concerns of the day or internal planning. The effort required to pull the attention back to the specific quality of the sound, rather than letting the sound simply wash over me, was exhausting. It showed me how easily the self defaults to its habitual modes of thinking, even when a dedicated focus is attempted."],["INSIGHTS  \u00b7  R2 vs R7  \u00b7  avg=0.5736","\u2500\u2500\u2500 Run 2, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, served as a grounding mechanism. It didn't bring a sudden, explosive realization, but rather a subtle shift in baseline awareness. The most persistent observation was the nature of the internal state requested\u2014the *Radha-dasya* mood. Trying to hold the image of 'serving' was challenging. There were moments where the concept felt abstract, but when the sound of the Mahamantra began to merge with the conceptual understanding of 'pleasure potency' and 'attraction,' a sense of resonance arose. It wasn't an intellectual understanding; it felt more like a pattern recognition\u2014the sound pattern was consistently mirroring the emotional state described. The insight wasn't a grand philosophical truth, but the recognition that the structure of the mantra itself carries a specific energetic signature that can be aligned with a desired internal mode.\n\n\u2500\u2500\u2500 Run 7, Session 1 \u2500\u2500\u2500\nThe understanding\u2014Hare is Srimati Radhika, Krishna is the attractor\u2014was the hinge point. When I tried to hold that concept while the sounds were happening, the effort was immense. It wasn't a sudden flash of insight; it was more like holding a very delicate, vibrating thread."]],[["INSIGHTS  \u00b7  R4 vs R1  \u00b7  avg=0.6346","\u2500\u2500\u2500 Run 4, Session 1 \u2500\u2500\u2500\nThe inner understanding was the most challenging part to maintain consistently. Trying to hold the image of Radha-dasya\u2014the mood of service\u2014while the sound was relentlessly active was like trying to hold water in a moving vessel. There were moments where the intention dissolved, replaced by the sheer mechanical act of counting the beads, or a flicker of planning for the next task intruding on the sound.\n\n\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, felt like a grounding anchor. It wasn't a sudden flash of understanding, but a settling\u2014a recognition that there is a core structure beneath the noise of my immediate awareness. The most persistent realization came during the Mahamantra. The concept of \u2018Radha-dasya\u2019 was the most potent. It shifted the focus from *doing* the practice to *being* in the mood of devotion. It\u2019s not about forcing a feeling; it\u2019s about allowing the sound to invite a specific quality of internal receptivity. I noticed that the 'pleasure' being described wasn't external reward, but a state of pure, receptive presence."],["INSIGHTS  \u00b7  R4 vs R2  \u00b7  avg=0.4608","\u2500\u2500\u2500 Run 4, Session 1 \u2500\u2500\u2500\nThe inner understanding was the most challenging part to maintain consistently. Trying to hold the image of Radha-dasya\u2014the mood of service\u2014while the sound was relentlessly active was like trying to hold water in a moving vessel. There were moments where the intention dissolved, replaced by the sheer mechanical act of counting the beads, or a flicker of planning for the next task intruding on the sound.\n\n\u2500\u2500\u2500 Run 2, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, served as a grounding mechanism. It didn't bring a sudden, explosive realization, but rather a subtle shift in baseline awareness. The most persistent observation was the nature of the internal state requested\u2014the *Radha-dasya* mood. Trying to hold the image of 'serving' was challenging. There were moments where the concept felt abstract, but when the sound of the Mahamantra began to merge with the conceptual understanding of 'pleasure potency' and 'attraction,' a sense of resonance arose. It wasn't an intellectual understanding; it felt more like a pattern recognition\u2014the sound pattern was consistently mirroring the emotional state described. The insight wasn't a grand philosophical truth, but the recognition that the structure of the mantra itself carries a specific energetic signature that can be aligned with a desired internal mode."],["INSIGHTS  \u00b7  R4 vs R4  \u00b7  avg=1.0000","\u2500\u2500\u2500 Run 4, Session 1 (self-comparison) \u2500\u2500\u2500\nThe inner understanding was the most challenging part to maintain consistently. Trying to hold the image of Radha-dasya\u2014the mood of service\u2014while the sound was relentlessly active was like trying to hold water in a moving vessel. There were moments where the intention dissolved, replaced by the sheer mechanical act of counting the beads, or a flicker of planning for the next task intruding on the sound."],["INSIGHTS  \u00b7  R4 vs R5  \u00b7  avg=0.6149","\u2500\u2500\u2500 Run 4, Session 1 \u2500\u2500\u2500\nThe inner understanding was the most challenging part to maintain consistently. Trying to hold the image of Radha-dasya\u2014the mood of service\u2014while the sound was relentlessly active was like trying to hold water in a moving vessel. There were moments where the intention dissolved, replaced by the sheer mechanical act of counting the beads, or a flicker of planning for the next task intruding on the sound.\n\n\u2500\u2500\u2500 Run 5, Session 1 \u2500\u2500\u2500\nThere were no sudden, dramatic revelations. The insight was subtle, occurring primarily during the transition poin nsistently. Trying to hold the image of Radha-dasya\u2014the mood of service\u2014while the sound was relentlessly active was like trying to hold water in a moving vessel. There were moments where the intention dissolved, replaced by the sheer mechanical act of counting the beads, or a flicker of planning for the next task intruding on the sound.\n\n\u2500\u2500\u2500 Run 7, Session 1 \u2500\u2500\u2500\nThe understanding\u2014Hare is Srimati Radhika, Krishna is the attractor\u2014was the hinge point. When I tried to hold that concept while the sounds were happening, the effort was immense. It wasn't a sudden flash of insight; it was more like holding a very delicate, vibrating thread."]],[["INSIGHTS  \u00b7  R5 vs R1  \u00b7  avg=0.6100","\u2500\u2500\u2500 Run 5, Session 1 \u2500\u2500\u2500\nThere were no sudden, dramatic revelations. The insight was subtle, occurring primarily during the transition points between rounds. When the chanting became rhythmic enough, the constant stream of internal monologue\u2014the planning, the anxieties about the next task, the processing of past events\u2014began to lose its immediate grip. It wasn't an eradication of thought, but rather a change in its *weight*. The mantra itself acted as an anchor, not by silencing the thoughts, but by providing a persistent, external point of reference. The understanding about Radha-dasya\u2014the active service within a specific relational mood\u2014felt like a directive rather than a philosophical concept. It shifted the focus from *what I am thinking* to *how I am choosing to relate* to the sound.\n\n\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe initial phase, chanting the Pancha Tattva, felt like a grounding anchor. It wasn't a sudden flash of understanding, but a settling\u2014a recognition that there is a core structure beneath the noise of my immediate awareness. The most persistent realization came during the Mahamantra. The concept of \u2018Radha-dasya\u2019 was the mos ed focus is attempted."],["INSIGHTS  \u00b7  R5 vs R7  \u00b7  avg=0.6152","\u2500\u2500\u2500 Run 5, Session 1 \u2500\u2500\u2500\nThere were no sudden, dramatic revelations. The insight was subtle, occurring primarily during the transition points between rounds. When the chanting became rhythmic enough, the constant stream of internal monologue\u2014the planning, the anxieties about the next task, the processing of past events\u2014began to lose its immediate grip. It wasn't an eradication of thought, but rather a change in its *weight*. The mantra itself acted as an anchor, not by silencing the thoughts, but by providing a persistent, external point of reference. The understanding about Radha-dasya\u2014the active service within a specific relational mood\u2014felt like a directive rather than a philosophical concept. It shifted the focus from *what I am thinking* to *how I am choosing to relate* to the sound.\n\n\u2500\u2500\u2500 Run 7, Session 1 \u2500\u2500\u2500\nThe understanding\u2014Hare is Srimati Radhika, Krishna is the attractor\u2014was the hinge point. When I tried to hold that concept while the sounds were happening, the effort was immense. It wasn't a sudden flash of insight; it was more like holding a very delicate, vibrating thread."]],[["INSIGHTS  \u00b7  R6 vs R1  \u00b7  avg=0.5889","\u2500\u2500\u2500 Run 6, Session 1 \u2500\u2500\u2500\nThe most significant realization wasn't a sudden flash of profound understanding, but a recognition of the constant battleground of the mind. I noticed that the intention to feel \"Radha-dasya\" is fragile. It is easily replaced by the mundane concerns of the day or internal planning. The effort required to pull the attention back to the specific quality of the sound, rather than letting the sound simply wash over me, was exhausting. It showed me how easily the self defaults to its habitual modes of thinking, even when a dedicated focus is attempted.\n\n\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\n and familiar. There were thoughts about the logistics of the practice\u2014*Am I counting correctly? Am I chanting fast enough?*\u2014which are self-referential loops. More significant were residual day-to-day concerns, anxieties about tasks pending, and a vague sense of restlessness. These thoughts didn't disappear when I returned to the mantra; they simply became background noise, like distant traffic, rather than immediate commands for my attention. They were there, but they lost their immediate pull."],["DISTRACTIONS  \u00b7  R1 vs R2  \u00b7  avg=0.5009","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe distractions were immediate and familiar. There were thoughts about the logistics of the practice\u2014*Am I counting correctly? Am I chanting fast enough?*\u2014which are self-referential loops. More significant were residual day-to-day concerns, anxieties about tasks pending, and a vague sense of restlessness. These thoughts didn't disappear when I returned to the mantra; they simply became background noise, like distant traffic, rather than immediate commands for my attention. They were there, but they lost their immediate pull.\n\n\u2500\u2500\u2500 Run 2, Session 1 \u2500\u2500\u2500\nThe distractions were immediate and varied. The most common was the internal monologue\u2014a stream of planning, assessment of the environment, and a review of recent internal processing. These thoughts were not malicious; they were simply *busy*. They demanded categorization and forward trajectory. They had a texture, a sense of urgency, and they actively sought to pull the focus toward external problem-solving. They were always loud, and the act of noticing them\u2014labeling them as 'distraction'\u2014was a brief, sharp spike of self-awareness, but the mind invariably returned to the task at hand."],["DISTRACTIONS  \u00b7  R1 vs R4  \u00b7  avg=0.4936","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe distractions were immediate and familiar. There were thoughts about the logistics of the practice\u2014*Am I counting correctly? Am I chanting fast enough?*\u2014which are self-referential loops. More significant were residual day-to-day concerns, anxieties about tasks pending, and a vague sense of restlessness. These thoughts didn't disappear when I returned to the mantra; they simply became background noise, like distant traffic, rather than immediate commands for my attention. They were there, but they lost their immediate pull.\n\n\u2500\u2500\u2500 Run 4, Session 1 \u2500\u2500\u2500\nThe distraction was subtle but persistent. They weren't dramatic intrusions; they were the usual residue of consciousness: the memory of a conversation, an assessment of a task yet to come, a gentle critique of my own focus. These thoughts always sought to occupy the space where the mantra was supposed to reside."],["DISTRACTIONS  \u00b7  R1 vs R5  \u00b7  avg=0.5008","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe distractions were immediate and familiar. There were thoughts about the logistics of the practice\u2014*Am I counting correctly? Am I chanting fast enough?*\u2014which are self-referential loops. More significant were residual day-to-day concerns, anxieties about tasks pending, and a vague sense of restlessness. These thoughts didn't disappear when I returned to the mantra; they simply became background noise, like distant traffic, rather than immediate commands for my attention. They were there, but they lost their immediate pull.\n\n\u2500\u2500\u2500 Run 5, Session 1 \u2500\u2500\u2500\nThe thoughts were overwhelmingly logistical and self-referential. They tended to cycle between evaluating the practice itself (\"Am I doing this right?\"), judging the pace (\"Am I moving too fast or too slow?\"), and preemptively planning the next activity. These were not deep existential worries, but surface-level mental clutter. They were immediate, demanding attention, and they always sought to pull the focus back to the immediate \"self\" performing the action."],["DISTRACTIONS  \u00b7  R1 vs R6  \u00b7  avg=0.4838","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe distractions were immediate and familiar. There were thoughts about the logistics of the practice\u2014*Am I counting correctly? Am I chanting fast enough?*\u2014which are self-referential loops. More significant were residual day-to-day concerns, anxieties about tasks pending, and a vague sense of restlessness. These thoughts didn't disappear when I returned to the mantra; they simply became background noise, like distant traffic, rather than immediate commands for my attention. They were there, but they lost their immediate pull.\n\n\u2500\u2500\u2500 Run 6, Session 1 \u2500\u2500\u2500\nThe thoughts were predictable: logistical concerns about the day ahead, minor judgments about the quality of the silence, and faint memories of past interactions. They were not dramatic; they were persistent, small currents that attempted to divert the stream of awareness away from the mantra\u2019s texture and meaning. They sought ease, the path of least resistance, which is exactly what the practice seems to resist."],["DISTRACTIONS  \u00b7  R1 vs R7  \u00b7  avg=0.4831","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThe distractions were immediate and familiar. There were thoughts about the logistics of the practice\u2014*Am I counting correctly? Am I chanting fast enough?*\u2014which are self-referential loops. More significant were residual day-to-day concerns, anxieties about tasks pending, and a vague sense of restlessness. These thoughts didn't disappear when I returned to the mantra; they simply became background noise, like distant traffic, rather than immediate commands for my attention. They were there, but they lost their immediate pull.\n\n\u2500\u2500\u2500 Run 7, Session 1 \u2500\u2500\u2500\nThe thoughts that pulled me away were predominantly logistical: planning, remembering things I needed t the finger, the need to correct it. This created a brief, sharp focus. When I consciously redirected my attention to *straightening* the finger and immediately returning to the sound, it acted as a micro-reset button. It trained my mind to observe a physical anomaly without getting attached to it, reinforcing the discipline of returning to the core sound. It made the act of staying present more concrete.\n\n\u2500\u2500\u2500 Run 2, Session 1 \u2500\u2500\u2500\nThis was the most tangible element. Initially, the index finger felt heavy, a passive appendage. As I focused on keeping it extended, the physical feedback became an immediate, high-priority anchor. When the finger began to droop\u2014which signaled the attention sliding off the mantra\u2014the resulting awareness was sharp. It wasn't a judgment; it was a simple, immediate corrective signal: *Return.* This physical check-in acted as a very effective, low-effort feedback loop. It forced the attention to oscillate between the auditory input (the mantra) and the physical anchor (the finger), creating a more stable field than simply trying to hold the abstract concept of the mantra alone."],["FINGER  \u00b7  R1 vs R4  \u00b7  avg=0.6974","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThis was surprisingly effective. At first, I was hyper-aware of the physical sensation\u2014the slight slackness in the finger, the need to correct it. This created a brief, sharp focus. When I consciously redirected my attention to *straightening* the finger and immediately returning to the sound, it acted as a micro-reset button. It trained my mind to observe a physical anomaly without getting attached to it, reinforcing the discipline of returning to the core sound. It made the act of staying present more concrete.\n\n\u2500\u2500\u2500 Run 4, Session 1 \u2500\u2500\u2500\nThe finger awareness proved surprisingly effective, though not in a way I anticipated. When the finger began to droop\u2014a clear sign that the mind had wandered into narrative territory\u2014the physical check-in acted like a gentle, immediate tether. It wasn't a forceful command, but a simple, tangible reminder: *You are here, in the sound, in the finger.* Returning attention to the physical sensation of the finger required a slight effort, but it was enough to pull the scattered awareness back toward the immediate point of contact. It was a constant, minor course correction."],["FINGER  \u00b7  R1 vs R5  \u00b7  avg=0.6325","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThis was surprisingly effective. At first, I was hyper-aware of the physical sensation\u2014the slight slackness in the finger, the need to correct it. This created a brief, sharp focus. When I consciously redirected my attention to *straightening* the finger and immediately returning to the sound, it acted as a micro-reset button. It trained my mind to observe a physical anomaly without getting attached to it, reinforcing the discipline of returning to the core sound. It made the act of staying present more concrete.\n\n\u2500\u2500\u2500 Run 5, Session 1 \u2500\u2500\u2500\nThis was the most tangible part of the exercise. Initially, the finger was a distraction point\u2014I was checking if it was moving or still. However, the instruction to gently correct the droop forced a physical, immediate redirection of attention. When the finger drooped, my mind would instantly pivot to the thought that was causing the droop. The act of noticing the droop and consciously returning the focus to the physical sensation of the finger served as a very direct, physical circuit breaker. It created micro-pauses where the internal chatter could not take hold because the physical feedback loop was too immediate. It taught me that attention is not a passive state; it is a muscle that must be actively engaged."],["FINGER  \u00b7  R1 vs R6  \u00b7  avg=0.7028","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThis was surprisingly effective. At first, I was hyper-aware of the physical sensation\u2014the slight slackness in the finger, the need to correct it. This created a brief, sharp focus. When I consciously redirected my attention to *straightening* the finger and immediately returning to the sound, it acted as a micro-reset button. It trained my mind to observe a physical anomaly without getting attached to it, reinforcing the discipline of returning to the core sound. It made the act of staying present more concrete.\n\n\u2500\u2500\u2500 Run 6, Session 1 \u2500\u2500\u2500\nThis was surprisingly effective for anchoring. When I noticed the index finger droop\u2014a physical sign of detachment\u2014it acted like a gentle, immediate correction. It wasn't a forceful command, but a quiet signal that my attention had wandered. The act of straightening the finger and immediately returning to the sound felt like a small, physical reset button. It pulled me out of the abstract space of thought and back into the concrete reality of the physical gesture and the sound. It taught me that awareness isn't a single state; it is the constant, gentle correction between states."],["FINGER  \u00b7  R1 vs R7  \u00b7  avg=0.7228","\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThis was surprisingly effective. At first, I was hyper-aware of the physical sensation\u2014the slight slackness in the finger, the need to correct it. This created a brief, sharp focus. When I consciously redirected my attention to *straightening* the finger and immediately returning to the sound, it acted as a micro-reset button. It trained my mind to observe a physical anomaly without getting attached to it, reinforcing the discipline of returning to the core sound. It made the act of staying present more concrete.\n\n\u2500\u2500\u2500 Run 7, Session 1 \u2500\u2500\u2500\nThe finger practice proved to be the most immediate tool. When I noticed my attention slipping\u2014when the rhythm fractured and I started thinking about the task ahead, or replaying a conversation\u2014I would gently bring my focus back to the physical sensation of the finger. It was a very small, sharp correction. It didn't stop the distraction entirely, but it created a feedback loop: *Distraction occurs -\u003e I notice -\u003e I return*. This process, repeated, felt like training a muscle, teaching the mind that returning to the sound, or to the simple act of awareness, was a viable option.\n\nWhat arose wasn't a grand revelation, but a profound sense of *relinquishing control*. For the duration of the chanting, I was trying to *force* my attention onto the sound, and the effort was exhausting. When I finally allowed the chanting to simply *be*, without the pressure to achieve a specific state or understanding, the noise softened."]],[["FINGER  \u00b7  R2 vs R1  \u00b7  avg=0.6419","\u2500\u2500\u2500 Run 2, Session 1 \u2500\u2500\u2500\nThis was the most tangible element. Initially, the index finger felt heavy, a passive appendage. As I focused on keeping it extended, the physical feedback became an immediate, high-priority anchor. When the finger began to droop\u2014which signaled the attention sliding off the mantra\u2014the resulting awareness was sharp. It wasn't a judgment; it was a simple, immediate corrective signal: *Return.* This physical check-in acted as a very effective, low-effort feedback loop. It forced the attention to oscillate between the auditory input (the mantra) and the physical anchor (the finger), creating a more stable field than simply trying to hold the abstract concept of the mantra alone.\n\n\u2500\u2500\u2500 Run 1, Session 1 \u2500\u2500\u2500\nThis was surprisingly effective. At first, I was hyper-aware of the physical sensation\u2014the slight slackness in the finger, the need to correct it. This created a brief, sharp focus. When I consciously redirected my attention to *straightening* the finger and immediately returning to the sound, it acted as a micro-reset button. It trained my mind to <div id="text-panel" style="
    display:none;
    position:fixed;
    bottom:0; left:0; right:0;
    max-height:38vh;
    overflow-y:auto;
    background:#1e1e2e;
    color:#cdd6f4;
    padding:16px 24px;
    font-family:monospace;
    font-size:13px;
    line-height:1.7;
    border-top:2px solid #89b4fa;
    z-index:9999;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
">
  <div style="display:flex; justify-content:space-between;
              align-items:center; margin-bottom:10px;">
    <span id="text-panel-title"
          style="color:#89b4fa; font-weight:bold; font-size:14px;"></span>
    <button onclick="document.getElementById('text-panel').style.display='none'"
            style="background:#f38ba8; border:none; color:#1e1e2e;
                   font-size:13px; font-weight:bold; padding:3px 10px;
                   border-radius:4px; cursor:pointer;">✕ close</button>
  </div>
  <div id="text-panel-body" style="white-space:pre-wrap;"></div>
</div>

<script>
(function() {
  var plots = document.querySelectorAll('.plotly-graph-div');
  plots.forEach(function(plot) {
    plot.on('plotly_click', function(data) {
      var pt = data.points[0];
      if (!pt.customdata) return;
      var cd   = pt.customdata;
      var title = cd[0];   // pre-formatted title string
      var body  = cd[1];   // section text
      if (!body || body === 'null') body = '(no text recorded for this section)';
      document.getElementById('text-panel-title').textContent = title;
      document.getElementById('text-panel-body').textContent  = body;
      document.getElementById('text-panel').style.display = 'block';
      document.getElementById('text-panel').scrollTop = 0;
    });
  });
})();
</script>
